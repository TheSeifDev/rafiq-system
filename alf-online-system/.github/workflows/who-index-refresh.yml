# ──────────────────────────────────────────────────────────────
# Rafiq WHO Index Refresh — تحديث فهرس منظمة الصحة العالمية
# Runs weekly (Monday 06:00 UTC) or on manual dispatch
# ──────────────────────────────────────────────────────────────
name: "WHO Index Refresh — تحديث فهرس WHO"

on:
  schedule:
    - cron: "0 6 * * 1"       # Every Monday at 06:00 UTC
  workflow_dispatch:            # Manual trigger from GitHub UI

permissions:
  contents: read

env:
  PYTHONDONTWRITEBYTECODE: 1

jobs:
  refresh-index:
    name: "🌍 تحديث فهرس WHO | Refresh WHO index"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: "📥 سحب الكود | Checkout"
        uses: actions/checkout@v4

      - name: "🐍 تثبيت بايثون | Setup Python 3.12"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: "💾 تخزين مؤقت pip | Cache pip"
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-who-3.12-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-who-3.12-

      - name: "📦 تثبيت التبعيات | Install dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install \
            edge-tts>=6.1.12 \
            groq>=0.9.0 \
            SpeechRecognition>=3.10.0 \
            arabic-reshaper>=3.0.0 \
            python-bidi>=0.6.0
          echo "✅ Dependencies installed"

      - name: "✅ فحص المصادر | Validate WHO sources"
        run: python who_indexer.py --validate-only

      - name: "🔄 بناء الفهرس | Build WHO index (max 24 topics)"
        run: python who_indexer.py --max-topics 24

      - name: "📤 رفع البيان | Upload manifest artifact"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: who-index-manifest
          path: .rafiq_cache/who_rag/manifest.json
          retention-days: 90
          if-no-files-found: warn
